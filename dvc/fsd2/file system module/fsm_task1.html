<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        // we are combining some html css and js function with setInterval()...
        size =15
        function text(){
            obj = document.getElementById("demo")
            obj.innerHTML = "hello!!"
            obj.style.color = "blue" 
            obj.style.fontSize = size+"px"
            if (size<=50){
                size ++
            }
        }
        setInterval(text,50)
    </script>
</body>
</html>
